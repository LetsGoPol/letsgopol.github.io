<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horario - LetsGoPol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/8587e006-8578-4c36-b1cc-fa2d067ac9c9-profile_image-70x70.png" alt="Logo">
      </div>
      <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="admin.html" class="auth-btn">Admin</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <h2>Horario de Streams</h2>
    <table id="scheduleTable">
      <thead>
        <tr>
          <th>Día</th>
          <th>Hora</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Lunes</td>
          <td>7:00 PM</td>
        </tr>
        <tr>
          <td>Miércoles</td>
          <td>7:00 PM</td>
        </tr>
        <tr>
          <td>Viernes</td>
          <td>9:00 PM</td>
        </tr>
      </tbody>
    </table>
    <!-- Solo se mostrará el formulario si es admin; para este ejemplo se muestra siempre -->
    <div id="editSchedule">
      <h3>Editar Horario</h3>
      <form id="scheduleForm">
        <input type="text" id="dia" placeholder="Día (ej. Martes)" required>
        <input type="text" id="hora" placeholder="Hora (ej. 8:00 PM)" required>
        <button type="submit">Guardar</button>
      </form>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
