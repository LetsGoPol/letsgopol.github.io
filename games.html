<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minijuegos - LetsGoPol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/8587e006-8578-4c36-b1cc-fa2d067ac9c9-profile_image-70x70.png" alt="Logo">
      </div>
      <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="games.html">Minijuegos</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <h2>Minijuegos</h2>
    <p>Monedas disponibles: <span id="userCoins">0</span></p>
    <div id="redeemCode">
      <input type="text" id="secretCode" placeholder="Introduce código secreto">
      <button onclick="redeemSecretCode()">Canjear Código</button>
    </div>
    <div class="games-container">
      <!-- Juego 1: Dispara y Evita -->
      <div class="game-item">
        <h3>Dispara y Evita</h3>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <p id="gameScore">Puntaje: 0</p>
        <button onclick="startGame('dispara')">Iniciar (Coste: 20 monedas)</button>
      </div>
      <!-- Juego 2: Atrapa las Estrellas -->
      <div class="game-item">
        <h3>Atrapa las Estrellas</h3>
        <canvas id="starGameCanvas" width="800" height="600"></canvas>
        <p id="starGameScore">Puntaje: 0</p>
        <button onclick="startGame('star')">Iniciar (Coste: 15 monedas)</button>
      </div>
      <!-- Juego 3: Memoria -->
      <div class="game-item">
        <h3>Juego de Memoria</h3>
        <div id="memory-game">
          <!-- Tarjetas generadas dinámicamente -->
        </div>
        <p id="memoryScore">Puntaje: 0</p>
        <button onclick="startMemoryGame()">Iniciar (Coste: 25 monedas)</button>
      </div>
      <!-- Máquina Tragaperras para Sorteos -->
      <div class="game-item">
        <h3>Máquina Tragaperras</h3>
        <div id="slotMachine">
          <button id="slotSpinBtn">Tirar (Coste: 10 monedas)</button>
          <div id="slotResult"></div>
        </div>
        <button id="paypalSpinBtn" onclick="location.href='https://www.paypal.com/cgi-bin/webscr?business=polpostigo@gmail.com&cmd=_donations&currency_code=EUR'">Tirar (1€)</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
