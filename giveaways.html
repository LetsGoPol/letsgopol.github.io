<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteos - LetsGoPol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Sorteos y Concursos</h2>
    <p>Utiliza tus monedas para una tirada o paga 1€ para una tirada a través de PayPal.</p>
    <!-- Caja de monedas y botón para tirar la máquina tragaperras -->
    <div id="slotMachine">
      <button id="slotSpinBtn">Tirar (Coste: 10 monedas)</button>
      <div id="slotResult"></div>
    </div>
    <button id="paypalSpinBtn">Tirar (1€)</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
